# Triggers `/api/telegram/daily-report` on each Vercel project.
# BP deployment → sends to BP team + BP head Telegram groups (2 messages).
# JM deployment → sends to JM team + JM head Telegram groups (2 messages).
# Four groups total: set TELEGRAM_* env vars on each Vercel project (not in GitHub).
name: HR Daily Report

on:
  schedule:
    # 4am Tashkent = 23:00 UTC. Mon–Sat (1–6)
    - cron: '0 23 * * 1-6'
  workflow_dispatch:
    inputs:
      date:
        description: 'Report date (YYYY-MM-DD). Leave empty for auto.'
        required: false
      skip_ai:
        description: 'Skip AI (1 = yes)'
        required: false
        default: '0'

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger daily report (BP + JM)
        env:
          APP_URL_BP: ${{ secrets.APP_URL_BP }}
          APP_URL_JM: ${{ secrets.APP_URL_JM }}
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_SKIP_AI: ${{ github.event.inputs.skip_ai }}
        run: |
          set -e
          QUERY=""
          if [ -n "$INPUT_DATE" ]; then
            QUERY="?date=${INPUT_DATE}"
          fi
          if [ "$INPUT_SKIP_AI" = "1" ]; then
            if [ -z "$QUERY" ]; then QUERY="?skipAI=1"; else QUERY="${QUERY}&skipAI=1"; fi
          fi

          call_api() {
            local BASE="$1"
            local NAME="$2"
            local URL="${BASE%/}/api/telegram/daily-report${QUERY}"
            echo "=== ${NAME}: GET ${URL} ==="
            if [ -n "$CRON_SECRET" ]; then
              curl -fsS --max-time 300 -H "Authorization: Bearer ${CRON_SECRET}" "$URL"
            else
              curl -fsS --max-time 300 "$URL"
            fi
            echo ""
          }

          if [ -n "$APP_URL_BP" ] && [ -n "$APP_URL_JM" ]; then
            call_api "$APP_URL_BP" "BP (Vercel)"
            call_api "$APP_URL_JM" "JM (Vercel)"
          elif [ -n "$APP_URL" ]; then
            echo "Warning: using legacy single APP_URL secret; set APP_URL_BP and APP_URL_JM for 4 Telegram groups."
            call_api "$APP_URL" "single deployment"
          else
            echo "ERROR: Add GitHub secrets APP_URL_BP and APP_URL_JM (e.g. https://call-monitor-app-bp.vercel.app and https://call-monitor-app-jm.vercel.app)."
            echo "Optional: APP_URL for one combined deployment only."
            exit 1
          fi
