# Triggers the Next.js route `/api/telegram/daily-report` on your deployed app.
# All Telegram + RingCentral + Monday + OpenAI env vars must be set on the host (e.g. Vercel), not in GitHub.
name: HR Daily Report

on:
  schedule:
    # 4am Tashkent = 23:00 UTC. Mon-Sat (1-6)
    - cron: '0 23 * * 1-6'
  workflow_dispatch:
    inputs:
      date:
        description: 'Report date (YYYY-MM-DD). Leave empty for auto.'
        required: false
      skip_ai:
        description: 'Skip AI (1 = yes)'
        required: false
        default: '0'

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger daily report API
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_SKIP_AI: ${{ github.event.inputs.skip_ai }}
        run: |
          set -e
          if [ -z "$APP_URL" ]; then
            echo "Set GitHub secret APP_URL to your production base URL (e.g. https://your-app.vercel.app)"
            exit 1
          fi
          BASE="${APP_URL%/}"
          QUERY=""
          if [ -n "$INPUT_DATE" ]; then
            QUERY="?date=${INPUT_DATE}"
          fi
          if [ "$INPUT_SKIP_AI" = "1" ]; then
            if [ -z "$QUERY" ]; then QUERY="?skipAI=1"; else QUERY="${QUERY}&skipAI=1"; fi
          fi
          URL="${BASE}/api/telegram/daily-report${QUERY}"
          echo "GET $URL"
          if [ -n "$CRON_SECRET" ]; then
            curl -fsS -H "Authorization: Bearer ${CRON_SECRET}" "$URL"
          else
            curl -fsS "$URL"
          fi
